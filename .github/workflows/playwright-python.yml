name: Playwright Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PAYPAL_SANDBOX_EMAIL: ${{ secrets.PAYPAL_SANDBOX_EMAIL }}
      PAYPAL_SANDBOX_PASSWORD: ${{ secrets.PAYPAL_SANDBOX_PASSWORD }}
      PAYPAL_RECIPIENT_EMAIL: ${{ secrets.PAYPAL_RECIPIENT_EMAIL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Playwright tests
        run: |
          pytest --browser=chromium --tracing on --video=retain-on-failure

      - name: Upload Playwright test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
